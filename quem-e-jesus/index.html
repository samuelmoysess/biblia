<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Em manutenção</title>

<style>

body{
    margin:0;
    height:100vh;
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    overflow:hidden;
}

.box{
    text-align:center;
    background:#1a1a1a;
    padding:40px;
    border-radius:25px;
    box-shadow:0 0 40px rgba(255,255,255,0.08);
    max-width:500px;
}

img{
    width:220px;
    border-radius:20px;
    margin-bottom:20px;
}

h1{
    color:white;
    font-size:38px;
    margin-bottom:10px;
}

p{
    color:#cfcfcf;
    font-size:18px;
}

</style>
</head>

<body>

<div class="box">

<img src="https://i.pinimg.com/originals/ee/f0/4e/eef04e7f8d933aa3dd0cb8bb81dca5b3.gif">

<h1>📖 Página em manutenção</h1>

<p>

</p>

<p>
Voltamos em breve ✨
</p>

</div>

</body>
</html>
